<svg width="1400" height="560" viewBox="0 0 1400 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#1f2937"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="badgeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#60a5fa"/>
      <stop offset="0.55" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="goldOverlay" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fff2a8" stop-opacity="0.7"/>
      <stop offset="0.55" stop-color="#f5c542" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#b7791f" stop-opacity="0.62"/>
    </linearGradient>
    <linearGradient id="goldRecolor" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fff6c9"/>
      <stop offset="0.45" stop-color="#f5c84c"/>
      <stop offset="1" stop-color="#a66b00"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="goldGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#f5c84c" flood-opacity="0.85"/>
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#f5c84c" flood-opacity="0.35"/>
    </filter>
    <filter id="desaturateGold" x="-20%" y="-20%" width="140%" height="140%">
      <feColorMatrix
        type="matrix"
        values="0.75 0.15 0.05 0 0.12
                0.55 0.38 0.05 0 0.08
                0.15 0.14 0.05 0 0.02
                0    0    0    1 0"/>
    </filter>
  </defs>

  <rect width="1400" height="560" fill="url(#bg)"/>

  <text x="700" y="62" fill="#F9FAFB" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle">
    Exemples visuels pour un badge hardcore
  </text>
  <text x="700" y="96" fill="#D1D5DB" font-family="Segoe UI, Arial, sans-serif" font-size="18" text-anchor="middle">
    Même badge de base, trois traitements visuels différents
  </text>

  <g transform="translate(70 130)">
    <rect x="0" y="0" width="390" height="360" rx="26" fill="url(#card)" stroke="#374151" filter="url(#softShadow)"/>
    <text x="195" y="46" fill="#F9FAFB" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">
      1. Surcouche dorée
    </text>
    <text x="195" y="76" fill="#D1D5DB" font-family="Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">
      Le badge reste lisible, avec une lumière or discrète
    </text>

    <g transform="translate(115 120)">
      <rect x="0" y="0" width="160" height="160" rx="22" fill="url(#badgeGrad)" stroke="#E5E7EB" stroke-opacity="0.22"/>
      <circle cx="80" cy="80" r="48" fill="#F8FAFC" fill-opacity="0.18"/>
      <path d="M80 38 L92 69 H125 L98 88 L108 120 L80 101 L52 120 L62 88 L35 69 H68 Z" fill="#E5E7EB"/>
      <rect x="0" y="0" width="160" height="160" rx="22" fill="url(#goldOverlay)"/>
      <path d="M18 30 C50 6, 116 8, 144 38" stroke="#FFF7CC" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
    </g>

    <text x="195" y="314" fill="#FDE68A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">
      Effet doux et premium
    </text>
    <text x="195" y="340" fill="#D1D5DB" font-family="Segoe UI, Arial, sans-serif" font-size="15" text-anchor="middle">
      Ideal si on veut rester proche du badge original
    </text>
  </g>

  <g transform="translate(505 130)">
    <rect x="0" y="0" width="390" height="360" rx="26" fill="url(#card)" stroke="#374151" filter="url(#softShadow)"/>
    <text x="195" y="46" fill="#F9FAFB" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">
      2. Recolorisation or
    </text>
    <text x="195" y="76" fill="#D1D5DB" font-family="Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">
      L'image entière bascule vers une palette dorée
    </text>

    <g transform="translate(115 120)" filter="url(#desaturateGold)">
      <rect x="0" y="0" width="160" height="160" rx="22" fill="url(#goldRecolor)" stroke="#FFF4BF" stroke-opacity="0.5"/>
      <circle cx="80" cy="80" r="48" fill="#FFF8D6" fill-opacity="0.22"/>
      <path d="M80 38 L92 69 H125 L98 88 L108 120 L80 101 L52 120 L62 88 L35 69 H68 Z" fill="#5B3A00"/>
    </g>

    <text x="195" y="314" fill="#FDE68A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">
      Effet plus fort et plus visible
    </text>
    <text x="195" y="340" fill="#D1D5DB" font-family="Segoe UI, Arial, sans-serif" font-size="15" text-anchor="middle">
      Peut modifier davantage la personnalité du badge
    </text>
  </g>

  <g transform="translate(940 130)">
    <rect x="0" y="0" width="390" height="360" rx="26" fill="url(#card)" stroke="#374151" filter="url(#softShadow)"/>
    <text x="195" y="46" fill="#F9FAFB" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle">
      3. Halo et contour dorés
    </text>
    <text x="195" y="76" fill="#D1D5DB" font-family="Segoe UI, Arial, sans-serif" font-size="16" text-anchor="middle">
      Le badge reste intact, mais sa distinction saute aux yeux
    </text>

    <g transform="translate(115 120)" filter="url(#goldGlow)">
      <rect x="-6" y="-6" width="172" height="172" rx="28" fill="none" stroke="#FDE68A" stroke-width="6" opacity="0.95"/>
      <rect x="0" y="0" width="160" height="160" rx="22" fill="url(#badgeGrad)" stroke="#FFF4BF" stroke-opacity="0.7" stroke-width="2"/>
      <circle cx="80" cy="80" r="48" fill="#F8FAFC" fill-opacity="0.18"/>
      <path d="M80 38 L92 69 H125 L98 88 L108 120 L80 101 L52 120 L62 88 L35 69 H68 Z" fill="#E5E7EB"/>
    </g>

    <text x="195" y="314" fill="#FDE68A" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" text-anchor="middle">
      Le plus lisible en grille
    </text>
    <text x="195" y="340" fill="#D1D5DB" font-family="Segoe UI, Arial, sans-serif" font-size="15" text-anchor="middle">
      Mon meilleur choix pour Compagnon
    </text>
  </g>
</svg>
