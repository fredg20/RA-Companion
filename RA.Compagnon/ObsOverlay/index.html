<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RA-Compagnon OBS</title>
  <link rel="stylesheet" href="overlay.css">
  <script src="overlay.js" defer></script>
</head>
<body>
  <main data-overlay="ra-compagnon">
    <div class="colonne-gauche">
      <section id="entete-bloc" class="entete entete-bloc" data-section="entete" data-section-label="En-tête">
        <div class="entete-principal">
          <div class="titre-zone">
            <h1 id="jeu">Aucun jeu</h1>
            <img id="image-console" class="icone-console" alt="Console">
          </div>
          <div class="progression-entete">
            <div id="progression" class="progression"></div>
            <div class="barre barre-entete"><span id="barre"></span></div>
            <div id="pourcentage" class="pourcentage"></div>
          </div>
        </div>
      </section>
    </div>
    <div class="colonne-droite">
      <section class="bloc" data-section="succes-courant" data-section-label="Rétrosuccès en cours">
        <div class="succes-courant-layout">
          <img id="badge-succes-courant" class="badge-succes-courant" alt="Badge du rétrosuccès">
          <div class="succes-courant-infos">
            <div id="succes" class="succes"></div>
            <div id="description" class="description"></div>
          </div>
        </div>
      </section>
    </div>
    <section id="grille-zone" class="bloc grille-zone" data-section="grille-succes" data-section-label="Rétrosuccès du jeu">
      <div id="grille-viewport" class="grille-viewport">
        <div id="grille" class="grille"></div>
      </div>
    </section>
  </main>
  <div id="toolbar-edition" class="toolbar-edition" data-section="toolbar-edition" data-section-label="Barre d'édition">
    <button id="quitter-edition" type="button">Modifier les sections</button>
    <button id="reinitialiser-layout" type="button">Réinitialiser</button>
  </div>
  <aside id="panneau-liens-preview" class="panneau-liens-preview" hidden>
    <div class="panneau-liens-preview-titre">Liens HTTP OBS</div>
    <div id="liste-liens-preview" class="liste-liens-preview"></div>
  </aside>
</body>
</html>
